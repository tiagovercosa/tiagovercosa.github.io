baseURL: https://vercosa.org/
title: "Tiago Lima"

defaultContentLanguage: pt-br

languages:
  pt-br:
    languageName: "Pt-Br"
    weight: 1
  en:
    languageName: "En"
    weight: 2

enableRobotsTXT: true
enableGitInfo: true

outputs:
  home: [html, llms]
  page: [html]
  section: [html, rss]

module:
  hugoVersion:
    extended: true
    min: "0.146.0"

  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)'], ['$', '$']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - identifier: about
      name: Sobre
      pageRef: /about
      weight: 1
      params:
        type: link
    - identifier: jardim_digital
      name: Jardim Digital
      pageRef: /docs
      weight: 2
      params:
        type: link
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 3
      params:
        type: link
    - identifier: publicacoes
      name: Publicações
      pageRef: /publications
      weight: 4
      params:
        type: link
    - identifier: archive
      name: Arquivo
      pageRef: /archive
      weight: 5
      params:
        type: link
    - identifier: search
      name: Pesquisa
      weight: 6
      params:
        type: search
    - name: Theme Toggle
      params:
        type: theme-toggle
    - name: Language Switcher
      params:
        type: language-switch
        label: true
        icon: "globe-alt"

params:
  externalLinkDecoration: true
  
  favicon:
    icon: logo.svg

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: image/logo.png

  theme:
    default: light
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  displayUpdatedDate: false
  dateFormat: "02 de January de 2006"
  displayReadingTime: true

  author:
    name: Tiago Lima
    email: contato@tiagolima.me
  
  description: "Blog do Tiago Lima falando sobre física, matemática, tecnologia, computação e coisas geek."

  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      tokenize: forward

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    width: normal

  imageZoom:
    enable: true

  analytics:
    umami:
      serverURL: "https://cloud.umami.is"
      websiteID: "9cb2875c-d10b-4078-b29d-ed2fb9e12ca9"
      scriptName: "script.js"

  social_comments:
    mastodon:
      host: "mastodon.social"
      username: "vercosa"
    bluesky:
      did: "did:plc:zcpwqpscnk5ktxoiejcezwuo"
            
  comments:
    enable: true
      